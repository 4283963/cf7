server:
  port: 8080

spring:
  application:
    name: drone-formation-control

  datasource:
    url: jdbc:h2:mem:dronecamp;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

python:
  trajectory:
    service:
      url: http://localhost:5001

deviation:
  warning:
    threshold: 0.3
  emergency:
    threshold: 0.8

logging:
  level:
    com.dronecamp.formation: DEBUG
