server:
  port: 8080

spring:
  application:
    name: drone-formation-control

  datasource:
    url: jdbc:postgresql://localhost:5432/dronecamp
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

python:
  trajectory:
    service:
      url: http://localhost:5001

deviation:
  warning:
    threshold: 0.3
  emergency:
    threshold: 0.8

logging:
  level:
    com.dronecamp.formation: DEBUG
    org.hibernate.SQL: WARN
